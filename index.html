<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crossnumber Puzzle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <!-- Mobile clue bar -->
  <div id="mobile-clue-bar"></div>

  <!-- Puzzle grid -->
  <div id="puzzle" class="puzzle"></div>

  <!-- Controls -->
  <div class="controls">
    <button id="check-btn">Check</button>
  </div>

  <!-- Clues below grid -->
  <div class="clue-container">
    <div class="clue-column">
      <h2>Across</h2>
      <ul id="across-list" class="clue-list"></ul>
    </div>
    <div class="clue-column">
      <h2>Down</h2>
      <ul id="down-list" class="clue-list"></ul>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
